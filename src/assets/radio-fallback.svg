<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo com gradiente escuro -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1d26"/>
      <stop offset="100%" style="stop-color:#12141a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8ff47"/>
      <stop offset="100%" style="stop-color:#47d4ff"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Ondas de sinal (3 arcos concêntricos) -->
  <path d="M 20 38 Q 32 18 44 38" stroke="url(#accent)"
        stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 24 42 Q 32 26 40 42" stroke="url(#accent)"
        stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 28 46 Q 32 34 36 46" stroke="url(#accent)"
        stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Ponto central (antena) -->
  <circle cx="32" cy="48" r="3" fill="url(#accent)"/>

  <!-- Linha base -->
  <line x1="20" y1="52" x2="44" y2="52"
        stroke="url(#accent)" stroke-width="1.5"
        stroke-linecap="round" opacity="0.5"/>
</svg>
